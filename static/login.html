<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — RSVP-MASTER</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #f8fafc 0%, #ffffff 50%, #f8fafc 100%);
      display: flex;
      flex-direction: column;
      color: #0f172a;
    }

    /* ── Navbar ── */
    header {
      position: sticky; top: 0; z-index: 30;
      border-bottom: 1px solid rgba(226,232,240,.8);
      background: rgba(255,255,255,.8);
      backdrop-filter: blur(12px);
    }
    .nav-inner {
      max-width: 1120px; margin: 0 auto;
      height: 64px; padding: 0 24px;
      display: flex; align-items: center;
    }
    .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .brand-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      box-shadow: 0 1px 3px rgba(0,0,0,.15);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .brand-icon svg { width: 16px; height: 16px; color: #fff; }
    .brand-name { font-size: 14px; font-weight: 600; letter-spacing: -.3px; color: #0f172a; }

    /* ── Main ── */
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 64px 16px; }
    .card-wrap { width: 100%; max-width: 384px; }

    .card {
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      background: #fff;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .card-accent { height: 6px; background: linear-gradient(90deg, #8b5cf6, #6366f1); }
    .card-body { padding: 32px; }

    .card-header { display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center; margin-bottom: 24px; }
    .lock-icon {
      width: 48px; height: 48px; border-radius: 12px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      box-shadow: 0 4px 12px rgba(124,58,237,.35);
      display: flex; align-items: center; justify-content: center;
    }
    .lock-icon svg { width: 20px; height: 20px; color: #fff; }
    .card-title { font-size: 20px; font-weight: 700; letter-spacing: -.3px; color: #0f172a; }
    .card-sub { font-size: 12px; color: #64748b; }

    /* Error */
    .error-box {
      display: none;
      margin-bottom: 16px;
      border-radius: 8px;
      border: 1px solid #fecaca;
      background: #fff1f2;
      padding: 12px 16px;
      font-size: 14px;
      color: #be123c;
    }

    /* Form */
    form { display: flex; flex-direction: column; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 14px; font-weight: 500; color: #334155; }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; color: #94a3b8; pointer-events: none;
    }
    input[type="text"], input[type="password"], input[type="email"], input[type="tel"], input[type="number"] {
      width: 100%; height: 36px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      background: #fff;
      padding: 0 12px 0 36px;
      font-size: 14px;
      color: #0f172a;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus { border-color: #8b5cf6; box-shadow: 0 0 0 3px rgba(139,92,246,.15); }
    input.has-toggle { padding-right: 40px; }
    .toggle-btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: #94a3b8; display: flex; align-items: center;
    }
    .toggle-btn:hover { color: #475569; }
    .toggle-btn svg { width: 16px; height: 16px; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      height: 36px; padding: 0 16px;
      border-radius: 6px; border: none; cursor: pointer;
      font-size: 14px; font-weight: 500; transition: opacity .15s, filter .15s;
      text-decoration: none;
    }
    .btn-primary {
      background: linear-gradient(90deg, #7c3aed, #4f46e5);
      color: #fff;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }
    .btn-primary:hover { filter: brightness(1.08); }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; }
    .btn-full { width: 100%; margin-top: 4px; }

    /* Footer link */
    .foot-note { margin-top: 16px; text-align: center; font-size: 14px; color: #64748b; }
    .foot-note a { color: #7c3aed; font-weight: 500; text-decoration: none; }
    .foot-note a:hover { text-decoration: underline; }

    footer { padding: 24px; text-align: center; font-size: 12px; color: #94a3b8; }
  </style>
</head>
<body>

<header>
  <div class="nav-inner">
    <a href="dashboard.html" class="brand">
      <div class="brand-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
      </div>
      <span class="brand-name">RSVP-MASTER</span>
    </a>
  </div>
</header>

<main>
  <div class="card-wrap">
    <div class="card">
      <div class="card-accent"></div>
      <div class="card-body">
        <div class="card-header">
          <div class="lock-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          </div>
          <h1 class="card-title">Admin Login</h1>
          <p class="card-sub">Sign in to access the admin dashboard</p>
        </div>

        <div class="error-box" id="errorBox">Please enter both username and password.</div>

        <form id="loginForm" novalidate>
          <div class="field">
            <label for="username">Username</label>
            <div class="input-wrap">
              <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input type="text" id="username" placeholder="Enter username" autocomplete="username" />
            </div>
          </div>

          <div class="field">
            <label for="password">Password</label>
            <div class="input-wrap">
              <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              <input type="password" id="password" class="has-toggle" placeholder="Enter password" autocomplete="current-password" />
              <button type="button" class="toggle-btn" id="togglePassword" aria-label="Toggle password">
                <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-full" id="submitBtn">Login</button>
        </form>
      </div>
    </div>

    <p class="foot-note">Not an admin? <a href="rsvp.html">Submit an RSVP</a></p>
  </div>
</main>

<footer>© 2026 Event RSVP System. All rights reserved.</footer>

<script src="assets/common.js"></script>
<script>
  const form = document.getElementById('loginForm');
  const errorBox = document.getElementById('errorBox');
  const submitBtn = document.getElementById('submitBtn');
  const pwInput = document.getElementById('password');
  const toggleBtn = document.getElementById('togglePassword');
  const eyeIcon = document.getElementById('eyeIcon');

  const eyeOpen = `<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
  const eyeOff = `<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`;

  let pwVisible = false;
  toggleBtn.addEventListener('click', () => {
    pwVisible = !pwVisible;
    pwInput.type = pwVisible ? 'text' : 'password';
    eyeIcon.innerHTML = pwVisible ? eyeOff : eyeOpen;
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const user = document.getElementById('username').value.trim();
    const pw = pwInput.value.trim();
    if (!user || !pw) {
      errorBox.style.display = 'block';
      return;
    }
    errorBox.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in…';
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
  });
</script>
</body>
</html>
